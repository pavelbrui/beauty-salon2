[build]
  command = "npx puppeteer browsers install chrome && npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_GOOGLE_MAPS_API_KEY,BOOKSY_BUSINESS_ID"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,BOOKSY_BUSINESS_ID,BOOKSY_SYNC_SECRET,BOOKSY_SYNC_DISCOVERY,VITE_BOOKSY_SYNC_SECRET,VITE_NOTIFICATION_SECRET,NOTIFICATION_SECRET,VITE_GOOGLE_MAPS_API_KEY"

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# 301 redirects: old encoded category URLs → clean slugs (PL)
[[redirects]]
  from = "/services/Makija%C5%BC%20permanentny"
  to = "/services/makijaz-permanentny"
  status = 301
  force = true

[[redirects]]
  from = "/services/Stylizacja%20rz%C4%99s"
