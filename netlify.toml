[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,BOOKSY_BUSINESS_ID,BOOKSY_SYNC_SECRET,VITE_BOOKSY_SYNC_SECRET,VITE_NOTIFICATION_SECRET,NOTIFICATION_SECRET"
  # Skip Puppeteer's own Chrome download — use Chromium from netlify-plugin-chromium instead
  PUPPETEER_SKIP_DOWNLOAD = "true"

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "netlify-plugin-chromium"
